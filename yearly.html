<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Yearly · Sales Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav"></div>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h2 class="mb-0">Total sales per year</h2>
      <div class="d-flex align-items-center gap-2">
        <label for="yearPicker" class="form-label mb-0 small">Year</label>
        <input type="number" id="yearPicker" min="2000" max="2100" step="1" class="form-control form-control-sm" style="max-width: 120px;">
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div id="bucketContainer">
          <div class="text-center text-muted py-4">Loading…</div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header d-flex justify-content-between align-items-center gap-2 flex-wrap">
            <span>Analytics this year</span>
            <select id="groupBy" class="form-select form-select-sm" style="max-width: 180px;">
              <option value="products">Top 5 products</option>
              <option value="categories">By category</option>
              <option value="types">By type</option>
            </select>
          </div>
          <div class="card-body">
            <canvas id="pie" height="220"></canvas>
            <div id="topList" class="mt-3"></div>
            <div id="slicePanel"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="totals-strip d-flex justify-content-around flex-wrap gap-2 mt-3" id="totalsStrip"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script type="module" src="js/yearly.js"></script>
</body>
</html>
