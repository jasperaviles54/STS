<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Today · Sales Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="nav"></div>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <div>
        <h2 class="mb-0">Sales for today</h2>
        <div class="text-muted small" id="todayDate"></div>
      </div>
      <button class="btn btn-primary" id="addBtn" data-bs-toggle="modal" data-bs-target="#saleModal">+ Add sale</button>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="table-responsive">
        <table class="table table-hover sales-table mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Product</th>
              <th class="text-end">Qty</th>
              <th class="text-end">Buy ₱</th>
              <th class="text-end">Sell ₱</th>
              <th class="text-end">Total Sell ₱</th>
              <th class="text-end">GP %</th>
              <th class="text-end">GP ₱</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="salesBody">
            <tr><td colspan="9" class="text-center text-muted py-4">Loading…</td></tr>
          </tbody>
          <tfoot id="salesFoot"></tfoot>
        </table>
      </div>
    </div>

    <div class="totals-strip d-flex justify-content-around flex-wrap gap-2" id="totalsStrip"></div>
  </div>

  <div class="modal fade" id="saleModal" tabindex="-1">
    <div class="modal-dialog">
      <form class="modal-content" id="saleForm">
        <div class="modal-header">
          <h5 class="modal-title" id="saleModalTitle">Add sale</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="saleId">
          <div class="mb-3">
            <label class="form-label">Product</label>
            <input id="productSearch" type="text" class="form-control" list="productList" autocomplete="off" required placeholder="Type to search…">
            <datalist id="productList"></datalist>
            <div class="form-text">
              Type to filter the list. Need a new product? <a href="products.html">Add it on the Products page.</a>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input id="quantity" type="number" min="1" step="1" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/today.js"></script>
</body>
</html>
