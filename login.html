<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign in · Sales Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-1">Sales Tracker</h4>
        <p class="text-muted mb-4">Sign in to continue.</p>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" required>
          </div>
          <div id="loginError" class="alert alert-danger d-none py-2 small"></div>
          <button id="loginBtn" type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/supabase.js";
    import { getSession } from "./js/auth.js";

    if (await getSession()) window.location.replace("today.html");

    const form = document.getElementById("loginForm");
    const errEl = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.classList.add("d-none");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove("d-none");
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }
      window.location.replace("today.html");
    });
  </script>
</body>
</html>
